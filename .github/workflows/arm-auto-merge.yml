name: Arm Auto-merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: write
  pull-requests: write

jobs:
  arm-auto-merge:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Enable squash auto-merge
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const number = context.payload.pull_request.number;

            const result = await github.graphql(
              `
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      id
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }
              `,
              { owner, repo, number }
            );

            const pullRequest = result.repository.pullRequest;
            if (pullRequest.autoMergeRequest) {
              core.info(`Auto-merge already enabled for PR #${number}.`);
              return;
            }

            try {
              await github.graphql(
                `
                  mutation($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(
                      input: {
                        pullRequestId: $pullRequestId
                        mergeMethod: SQUASH
                      }
                    ) {
                      pullRequest {
                        number
                      }
                    }
                  }
                `,
                { pullRequestId: pullRequest.id }
              );
              core.info(`Enabled squash auto-merge for PR #${number}.`);
            } catch (error) {
              const message = String(error.message || error);
              core.setFailed(
                `Could not enable auto-merge for PR #${number}: ${message}. ` +
                  `Verify the repository settings in docs/repo-settings.md.`
              );
            }
